# demo_primitives.cfg
# Showcase de toutes les primitives géométriques de base
# Sphere, Plane, Cylinder, Cone, Cube — éclairage propre, fond sombre

camera:
{
    resolution = { width = 1920; height = 1080; };
    position   = { x = 0; y = -220; z = 70; };
    rotation   = { x = 0; y = 0; z = 0; };
    fieldOfView = 75.0;
    antialiasing = 2;
};

primitives:
{
    # --- SPHERE (gauche) ---
    spheres = (
        {
            x = -180; y = 60; z = 35;
            r = 35;
            material = {
                type = "Color";
                color = { r = 220; g = 80; b = 60; };
                reflectivity = 0.2;
            };
        }
    );

    # --- CYLINDRE (centre-gauche) ---
    cylindres = (
        {
            x = -70; y = 60; z = 10;
            r = 25; h = 70;
            material = {
                type = "Color";
                color = { r = 80; g = 180; b = 220; };
                reflectivity = 0.15;
            };
            rotation = { x = 0; y = 0; z = 0; };
        }
    );

    # --- CONE (centre) ---
    cones = (
        {
            x = 40; y = 60; z = 0;
            r = 30; h = 80;
            material = {
                type = "Color";
                color = { r = 100; g = 220; b = 100; };
                reflectivity = 0.1;
            };
            rotation = { x = 180; y = 0; z = 0; };
        }
    );

    # --- CUBE (centre-droite) ---
    cubes = (
        {
            x = 145; y = 70; z = 20;
            sizeX = 50; sizeY = 50; sizeZ = 50;
            rotation = { x = 15; y = 30; z = 10; };
            material = {
                type = "Color";
                color = { r = 220; g = 170; b = 50; };
                reflectivity = 0.2;
            };
        }
    );

    # --- TORUS (droite) ---
    torus = (
        {
            x = 270; y = 70; z = 30;
            R = 28.0; r = 9.0;
            rotation = { x = 20; y = 0; z = 30; };
            material = {
                type = "Color";
                color = { r = 180; g = 80; b = 220; };
                reflectivity = 0.25;
            };
        }
    );

    # --- SOL : damier pour bien voir les ombres ---
    planes = (
        {
            axis = "Z";
            position = -15;
            material = {
                type = "Chessboard";
                scale = 35;
                color1 = { r = 230; g = 230; b = 230; };
                color2 = { r = 40; g = 40; b = 40; };
                reflectivity = 0.08;
            };
        },
        # Mur de fond
        {
            axis = "Y";
            position = 250;
            material = {
                type = "Color";
                color = { r = 20; g = 20; b = 30; };
                reflectivity = 0.0;
            };
        }
    );
};

background = { r = 10; g = 10; b = 18; };

lights:
{
    ambient = 0.25;
    diffuse = 1.0;

    point = (
        {
            x = -50;
            y = -150;
            z = 300;
            intensity = 1.0;
            phong = 64;
        },
        {
            x = 300;
            y = -100;
            z = 200;
            intensity = 0.5;
            color = { r = 200; g = 220; b = 255; };
            phong = 32;
        }
    );

    directional = (
        {
            x = 0.3;
            y = 0.5;
            z = -1.0;
        }
    );
};
