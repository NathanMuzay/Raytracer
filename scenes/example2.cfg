# example2.cfg
# Arène : cylindre central argenté, cônes gardiens, spirale chromatique de sphères
# Améliorations : antialiasing, fog, lumières colorées avec phong, sol damier réfléchissant

camera:
{
    resolution = { width = 1920; height = 1080; };
    position   = { x = 0; y = -400; z = 160; };
    rotation   = { x = 0; y = 0; z = 0; };
    fieldOfView = 78.0;
    antialiasing = 2;
    fog = {
        start = 500.0;
        density = 0.002;
        color = { r = 8; g = 5; b = 5; };
    };
};

primitives:
{
    # Cylindre central argenté — miroir partiel
    cylindres = (
        {
            x = 0; y = 300; z = 0;
            r = 60; h = 400;
            material = {
                type = "Color";
                color = { r = 210; g = 215; b = 220; };
                reflectivity = 0.45;
            };
            rotation = { x = 0; y = 0; z = 0; };
        }
    );

    cones = (
        # Cônes gardiens — teinte cuivrée au lieu du vert plat
        { x = -200; y = 200; z = -30; r = 40; h = 120; material = { type = "Color"; color = { r = 200; g = 120; b = 30; }; reflectivity = 0.15; }; rotation = { x = 180; y = 0; z = 0; }; },
        { x = 200;  y = 200; z = -30; r = 40; h = 120; material = { type = "Color"; color = { r = 200; g = 120; b = 30; }; reflectivity = 0.15; }; rotation = { x = 180; y = 0; z = 0; }; },
        { x = -200; y = 400; z = -30; r = 40; h = 120; material = { type = "Color"; color = { r = 200; g = 120; b = 30; }; reflectivity = 0.15; }; rotation = { x = 180; y = 0; z = 0; }; },
        { x = 200;  y = 400; z = -30; r = 40; h = 120; material = { type = "Color"; color = { r = 200; g = 120; b = 30; }; reflectivity = 0.15; }; rotation = { x = 180; y = 0; z = 0; }; },
        { x = -200; y = 600; z = -30; r = 40; h = 120; material = { type = "Color"; color = { r = 200; g = 120; b = 30; }; reflectivity = 0.15; }; rotation = { x = 180; y = 0; z = 0; }; },
        { x = 200;  y = 600; z = -30; r = 40; h = 120; material = { type = "Color"; color = { r = 200; g = 120; b = 30; }; reflectivity = 0.15; }; rotation = { x = 180; y = 0; z = 0; }; },
        { x = 0;    y = 150; z = -30; r = 40; h = 120; material = { type = "Color"; color = { r = 200; g = 120; b = 30; }; reflectivity = 0.15; }; rotation = { x = 180; y = 0; z = 0; }; },
        { x = 0;    y = 650; z = -30; r = 40; h = 120; material = { type = "Color"; color = { r = 200; g = 120; b = 30; }; reflectivity = 0.15; }; rotation = { x = 180; y = 0; z = 0; }; }
    );

    spheres = (
        # Spirale chromatique — rayon et réflectivité augmentés
        { x = 80;   y = 180; z = 10;  r = 14; material = { type = "Color"; color = { r = 0;   g = 220; b = 220; }; reflectivity = 0.2; }; },
        { x = 95;   y = 210; z = 25;  r = 14; material = { type = "Color"; color = { r = 20;  g = 200; b = 180; }; reflectivity = 0.2; }; },
        { x = 85;   y = 240; z = 42;  r = 14; material = { type = "Color"; color = { r = 60;  g = 180; b = 60;  }; reflectivity = 0.2; }; },
        { x = 60;   y = 270; z = 58;  r = 14; material = { type = "Color"; color = { r = 120; g = 200; b = 20;  }; reflectivity = 0.2; }; },
        { x = 20;   y = 300; z = 70;  r = 14; material = { type = "Color"; color = { r = 200; g = 200; b = 20;  }; reflectivity = 0.2; }; },
        { x = -25;  y = 330; z = 78;  r = 14; material = { type = "Color"; color = { r = 220; g = 160; b = 20;  }; reflectivity = 0.2; }; },
        { x = -65;  y = 360; z = 80;  r = 14; material = { type = "Color"; color = { r = 220; g = 100; b = 20;  }; reflectivity = 0.2; }; },
        { x = -88;  y = 390; z = 75;  r = 14; material = { type = "Color"; color = { r = 220; g = 40;  b = 40;  }; reflectivity = 0.2; }; },
        { x = -85;  y = 420; z = 62;  r = 14; material = { type = "Color"; color = { r = 200; g = 20;  b = 120; }; reflectivity = 0.2; }; },
        { x = -60;  y = 450; z = 45;  r = 14; material = { type = "Color"; color = { r = 180; g = 20;  b = 180; }; reflectivity = 0.2; }; },
        { x = -20;  y = 480; z = 28;  r = 14; material = { type = "Color"; color = { r = 120; g = 20;  b = 220; }; reflectivity = 0.2; }; },
        { x = 25;   y = 510; z = 12;  r = 14; material = { type = "Color"; color = { r = 60;  g = 20;  b = 220; }; reflectivity = 0.2; }; },
        { x = 65;   y = 540; z = 5;   r = 14; material = { type = "Color"; color = { r = 20;  g = 60;  b = 220; }; reflectivity = 0.2; }; },
        { x = 88;   y = 570; z = 10;  r = 14; material = { type = "Color"; color = { r = 20;  g = 140; b = 200; }; reflectivity = 0.2; }; },
        { x = 82;   y = 600; z = 28;  r = 14; material = { type = "Color"; color = { r = 20;  g = 200; b = 160; }; reflectivity = 0.2; }; }
    );

    planes = (
        # Sol damier réfléchissant — remplace le sol rouge plat
        {
            axis = "Z";
            position = -40;
            material = {
                type = "Chessboard";
                scale = 60;
                color1 = { r = 200; g = 50; b = 50; };
                color2 = { r = 60; g = 10; b = 10; };
                reflectivity = 0.2;
            };
        },
        # Murs latéraux — ton sombre
        {
            axis = "X";
            position = -320;
            material = {
                type = "Color";
                color = { r = 40; g = 10; b = 10; };
                reflectivity = 0.05;
            };
        },
        {
            axis = "X";
            position = 320;
            material = {
                type = "Color";
                color = { r = 40; g = 10; b = 10; };
                reflectivity = 0.05;
            };
        }
    );
};

lights:
{
    ambient = 0.25;
    diffuse = 1.0;

    point = (
        # Lumière principale froide — zénith
        {
            x = 0; y = 300; z = 600;
            intensity = 1.0;
            color = { r = 220; g = 240; b = 255; };
            phong = 64;
        },
        # Lumière chaude droite
        {
            x = 350; y = 200; z = 350;
            intensity = 0.6;
            color = { r = 255; g = 200; b = 100; };
            phong = 32;
        },
        # Lumière froide gauche
        {
            x = -350; y = 200; z = 350;
            intensity = 0.6;
            color = { r = 100; g = 160; b = 255; };
            phong = 32;
        }
    );

    directional = (
        {
            x = 0.0;
            y = 0.5;
            z = -0.8;
        }
    );
};
