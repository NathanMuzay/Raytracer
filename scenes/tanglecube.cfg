# tanglecube.cfg - Showcase Tanglecube : variantes k/c, matériaux riches

camera:
{
    resolution = { width = 1920; height = 1080; };
    position   = { x = 0; y = -220; z = 70; };
    rotation   = { x = 0; y = 0; z = 0; };
    fieldOfView = 75.0;
    antialiasing = 2;
    fog = {
        start = 350.0;
        density = 0.002;
        color = { r = 8; g = 5; b = 18; };
    };
};

background = { r = 8; g = 5; b = 18; };

primitives:
{
    tanglecubes = (
        # Centre — forme classique, miroir argent
        {
            x = 0; y = 120; z = 40;
            scale = 40.0;
            k = 5.0; c = 11.8;
            rotation = { x = 20; y = 35; z = 10; };
            material = {
                type = "Color";
                color = { r = 215; g = 215; b = 230; };
                reflectivity = 0.55;
            };
        },
        # Gauche — pincé (c bas), or chaud
        {
            x = -160; y = 110; z = 20;
            scale = 32.0;
            k = 5.0; c = 9.5;
            rotation = { x = 0; y = 55; z = 20; };
            material = {
                type = "Color";
                color = { r = 255; g = 195; b = 55; };
                reflectivity = 0.3;
            };
        },
        # Droite — gonflé (c haut), cyan électrique
        {
            x = 160; y = 110; z = 20;
            scale = 32.0;
            k = 5.0; c = 13.5;
            rotation = { x = -15; y = -50; z = 5; };
            material = {
                type = "Color";
                color = { r = 50; g = 225; b = 235; };
                reflectivity = 0.3;
            };
        },
        # Arrière-gauche — Perlin marbre, forme standard
        {
            x = -80; y = 220; z = 15;
            scale = 25.0;
            k = 5.0; c = 11.8;
            rotation = { x = 30; y = 0; z = 45; };
            material = {
                type = "PerlinNoise";
                scale = 14.0; persistence = 0.55; octaves = 5;
                color1 = { r = 200; g = 185; b = 160; };
                color2 = { r = 55; g = 38; b = 18; };
            };
        },
        # Arrière-droit — violet, k plus fort (lobes plus marqués)
        {
            x = 80; y = 220; z = 15;
            scale = 25.0;
            k = 6.0; c = 11.8;
            rotation = { x = -30; y = 20; z = -45; };
            material = {
                type = "Color";
                color = { r = 170; g = 70; b = 255; };
                reflectivity = 0.25;
            };
        }
    );

    planes = (
        {
            axis = "Z";
            position = 0;
            material = {
                type = "Chessboard";
                scale = 60;
                color1 = { r = 45; g = 38; b = 65; };
                color2 = { r = 15; g = 12; b = 25; };
                reflectivity = 0.35;
            };
        },
        {
            axis = "Y";
            position = 380;
            material = {
                type = "Color";
                color = { r = 12; g = 8; b = 22; };
                reflectivity = 0.05;
            };
        }
    );
};

lights:
{
    ambient = 0.1;
    diffuse = 1.0;

    point = (
        {
            x = 0; y = -50; z = 250;
            intensity = 1.8;
            color = { r = 255; g = 245; b = 220; };
            phong = 128;
        },
        {
            x = -280; y = 80; z = 150;
            intensity = 0.6;
            color = { r = 80; g = 100; b = 255; };
            phong = 64;
        },
        {
            x = 280; y = 80; z = 150;
            intensity = 0.6;
            color = { r = 255; g = 100; b = 60; };
            phong = 64;
        },
        {
            x = 0; y = 120; z = 20;
            intensity = 0.3;
            color = { r = 180; g = 255; b = 200; };
            phong = 16;
        }
    );

    directional = ();
};
