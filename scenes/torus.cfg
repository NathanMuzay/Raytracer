# torus.cfg - Showcase Torus : anneaux imbriqués, éclairage dramatique

camera:
{
    resolution = { width = 1920; height = 1080; };
    position   = { x = 0; y = -180; z = 80; };
    rotation   = { x = 0; y = 0; z = 0; };
    fieldOfView = 72.0;
    antialiasing = 2;
    fog = {
        start = 300.0;
        density = 0.003;
        color = { r = 5; g = 3; b = 12; };
    };
};

background = { r = 5; g = 3; b = 12; };

primitives:
{
    torus = (
        # Grand anneau central horizontal — or réfléchissant
        {
            x = 0; y = 100; z = 50;
            R = 70.0; r = 12.0;
            rotation = { x = 15; y = 0; z = 0; };
            material = {
                type = "Color";
                color = { r = 255; g = 200; b = 60; };
                reflectivity = 0.5;
            };
        },
        # Anneau vertical gauche — cyan
        {
            x = -80; y = 100; z = 50;
            R = 45.0; r = 8.0;
            rotation = { x = 0; y = 90; z = 20; };
            material = {
                type = "Color";
                color = { r = 60; g = 220; b = 255; };
                reflectivity = 0.4;
            };
        },
        # Anneau vertical droit — rose
        {
            x = 80; y = 100; z = 50;
            R = 45.0; r = 8.0;
            rotation = { x = 0; y = 90; z = -20; };
            material = {
                type = "Color";
                color = { r = 255; g = 80; b = 180; };
                reflectivity = 0.4;
            };
        },
        # Petit anneau incliné avant — vert
        {
            x = -30; y = 30; z = 25;
            R = 28.0; r = 5.0;
            rotation = { x = 45; y = 30; z = 0; };
            material = {
                type = "Color";
                color = { r = 80; g = 230; b = 120; };
                reflectivity = 0.3;
            };
        },
        # Petit anneau incliné avant — violet
        {
            x = 30; y = 30; z = 25;
            R = 28.0; r = 5.0;
            rotation = { x = 45; y = -30; z = 0; };
            material = {
                type = "Color";
                color = { r = 180; g = 80; b = 255; };
                reflectivity = 0.3;
            };
        },
        # Anneau Perlin au sol — marbre
        {
            x = 0; y = 160; z = 10;
            R = 55.0; r = 9.0;
            rotation = { x = 80; y = 0; z = 0; };
            material = {
                type = "PerlinNoise";
                scale = 15.0; persistence = 0.55; octaves = 5;
                color1 = { r = 210; g = 195; b = 170; };
                color2 = { r = 60; g = 40; b = 20; };
            };
        }
    );

    planes = (
        {
            axis = "Z";
            position = 0;
            material = {
                type = "Chessboard";
                scale = 55;
                color1 = { r = 40; g = 35; b = 60; };
                color2 = { r = 15; g = 12; b = 22; };
                reflectivity = 0.4;
            };
        },
        {
            axis = "Y";
            position = 320;
            material = {
                type = "Color";
                color = { r = 10; g = 8; b = 20; };
                reflectivity = 0.05;
            };
        }
    );
};

lights:
{
    ambient = 0.1;
    diffuse = 1.0;

    point = (
        {
            x = 0; y = 0; z = 220;
            intensity = 1.8;
            color = { r = 255; g = 240; b = 200; };
            phong = 128;
        },
        {
            x = -250; y = 60; z = 120;
            intensity = 0.7;
            color = { r = 80; g = 120; b = 255; };
            phong = 64;
        },
        {
            x = 250; y = 60; z = 120;
            intensity = 0.7;
            color = { r = 255; g = 80; b = 150; };
            phong = 64;
        },
        {
            x = 0; y = -80; z = 60;
            intensity = 0.4;
            color = { r = 100; g = 255; b = 180; };
            phong = 32;
        }
    );

    directional = ();
};
