# emission_showcase.cfg — Scène full émission, zéro lumière artificielle
# Tout l'éclairage vient des sphères émissives elles-mêmes

camera:
{
    resolution   = { width = 1920; height = 1080; };
    position     = { x = 0; y = -280; z = 75; };
    rotation     = { x = 0; y = 0; z = 0; };
    fieldOfView  = 72.0;
    antialiasing = 2;
};

background = { r = 0; g = 0; b = 0; };

primitives:
{
    spheres = (

        # ── Soleil central — blanc chaud, très intense ───────────────────────
        {
            x = 0; y = 120; z = 60; r = 38;
            emit           = true;
            emit_intensity = 5.0;
            material = {
                type  = "Color";
                color = { r = 255; g = 240; b = 195; };
                reflectivity = 0.0;
            };
        },

        # ── Orbe rouge — gauche avant ────────────────────────────────────────
        {
            x = -155; y = 80; z = 30; r = 24;
            emit           = true;
            emit_intensity = 3.2;
            material = {
                type  = "Color";
                color = { r = 255; g = 55; b = 35; };
                reflectivity = 0.0;
            };
        },

        # ── Orbe bleu — droite avant ─────────────────────────────────────────
        {
            x = 155; y = 80; z = 30; r = 24;
            emit           = true;
            emit_intensity = 3.2;
            material = {
                type  = "Color";
                color = { r = 45; g = 115; b = 255; };
                reflectivity = 0.0;
            };
        },

        # ── Petite orbe verte — gauche haut ──────────────────────────────────
        {
            x = -80; y = 60; z = 95; r = 14;
            emit           = true;
            emit_intensity = 2.5;
            material = {
                type  = "Color";
                color = { r = 55; g = 230; b = 100; };
                reflectivity = 0.0;
            };
        },

        # ── Petite orbe violette — droite haut ───────────────────────────────
        {
            x = 80; y = 60; z = 95; r = 14;
            emit           = true;
            emit_intensity = 2.5;
            material = {
                type  = "Color";
                color = { r = 185; g = 55; b = 255; };
                reflectivity = 0.0;
            };
        },

        # ── Micro orbe orange — très proche du sol ───────────────────────────
        {
            x = -30; y = 35; z = 12; r = 8;
            emit           = true;
            emit_intensity = 2.0;
            material = {
                type  = "Color";
                color = { r = 255; g = 145; b = 30; };
                reflectivity = 0.0;
            };
        },

        # ── Micro orbe cyan ──────────────────────────────────────────────────
        {
            x = 40; y = 35; z = 12; r = 8;
            emit           = true;
            emit_intensity = 2.0;
            material = {
                type  = "Color";
                color = { r = 30; g = 218; b = 225; };
                reflectivity = 0.0;
            };
        },

        # ── Sphères réceptrices (elles reçoivent la lumière des orbes) ───────

        # Miroir argenté — reflète toutes les couleurs
        {
            x = -60; y = 100; z = 35; r = 35;
            material = {
                type         = "Color";
                color        = { r = 235; g = 238; b = 245; };
                reflectivity = 0.88;
            };
        },

        # Mate blanche — reçoit et montre bien la GI colorée
        {
            x = 70; y = 95; z = 28; r = 28;
            material = {
                type         = "Color";
                color        = { r = 242; g = 242; b = 242; };
                reflectivity = 0.04;
            };
        },

        # Marbre Perlin — texture + lumière colorée = résultat intéressant
        {
            x = 0; y = 55; z = 22; r = 22;
            material = {
                type        = "PerlinNoise";
                scale       = 18.0;
                persistence = 0.55;
                octaves     = 5;
                color1      = { r = 215; g = 200; b = 175; };
                color2      = { r = 52;  g = 36;  b = 20;  };
            };
        }
    );

    planes = (
        # Sol très sombre et légèrement réfléchissant
        # — les halos des orbes s'y impriment
        {
            axis     = "Z";
            position = 0;
            material = {
                type         = "Color";
                color        = { r = 10; g = 10; b = 14; };
                reflectivity = 0.35;
            };
        },
        # Mur fond sombre — laisse les couleurs d'émission ressortir
        {
            axis     = "Y";
            position = 320;
            material = {
                type         = "Color";
                color        = { r = 8; g = 8; b = 12; };
                reflectivity = 0.08;
            };
        },
        # Mur gauche très sombre
        {
            axis     = "X";
            position = -260;
            material = {
                type         = "Color";
                color        = { r = 8; g = 6; b = 10; };
                reflectivity = 0.05;
            };
        },
        # Mur droit très sombre
        {
            axis     = "X";
            position = 260;
            material = {
                type         = "Color";
                color        = { r = 6; g = 8; b = 10; };
                reflectivity = 0.05;
            };
        }
    );
};

lights:
{
    ambient = 0.0;
    diffuse = 1.0;

    point      = ();
    directional = ();
};
