# GI Demo — boîte de Cornell simplifiée
camera:
{
    resolution = { width = 800; height = 600; };
    position   = { x = 0; y = -200; z = 50; };
    rotation   = { x = 0; y = 0; z = 0; };
    fieldOfView = 60.0;
    antialiasing = 4;  # 9 samples par pixel — important pour GI
};

background = { r = 0; g = 0; b = 0; };

primitives:
{
    spheres = (
        # Sphère rouge gauche
        {
            x = -40; y = 60; z = 10; r = 28;
            material = {
                type = "Color";
                color = { r = 220; g = 60; b = 60; };
                reflectivity = 0.05;
            };
        },
        # Sphère bleue droite
        {
            x = 45; y = 60; z = 10; r = 28;
            material = {
                type = "Color";
                color = { r = 60; g = 100; b = 220; };
                reflectivity = 0.05;
            };
        },
        # Sphère miroir centre
        {
            x = 0; y = 80; z = 25; r = 22;
            material = {
                type = "Color";
                color = { r = 240; g = 240; b = 240; };
            };
            emit = true;
            emit_intensity = 5.0;
        }
    );

    planes = (
        # Sol blanc
        {
            axis = "Z"; position = -20;
            material = {
                type = "Color";
                color = { r = 230; g = 230; b = 230; };
                reflectivity = 0.0;
            };
        },
        # Plafond blanc
        {
            axis = "Z"; position = 120;
            material = {
                type = "Color";
                color = { r = 230; g = 230; b = 230; };
                reflectivity = 0.0;
            };
        },
        # Fond blanc
        {
            axis = "Y"; position = 180;
            material = {
                type = "Color";
                color = { r = 230; g = 230; b = 230; };
                reflectivity = 0.0;
            };
        },
        # Mur gauche rouge
        {
            axis = "X"; position = -120;
            material = {
                type = "Color";
                color = { r = 200; g = 50; b = 50; };
                reflectivity = 0.0;
            };
        },
        # Mur droit vert
        {
            axis = "X"; position = 120;
            material = {
                type = "Color";
                color = { r = 50; g = 180; b = 50; };
                reflectivity = 0.0;
            };
        }
    );
};

lights:
{
    ambient = 0.05;
    diffuse = 1.0;

    point = (
        {
            x = 0; y = 0; z = 110;
            intensity = 1.5;
            color = { r = 255; g = 245; b = 220; };
            phong = 32;
        }
    );
    directional = ();
};
