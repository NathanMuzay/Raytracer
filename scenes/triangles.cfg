# triangles.cfg
# Showcase des triangles — composition géométrique style origami
# Plusieurs triangles formant une pyramide éclatée + triangles décoratifs

camera:
{
    resolution = { width = 1920; height = 1080; };
    position   = { x = 0; y = -180; z = 60; };
    rotation   = { x = 0; y = 0; z = 0; };
    fieldOfView = 72.0;
    antialiasing = 2;
    fog = {
        start = 200.0;
        density = 0.004;
        color = { r = 5; g = 5; b = 12; };
    };
};

primitives:
{
    triangles = (
        # Face centrale rouge — grand triangle face cam
        {
            v0 = { x =   0; y = 30; z = 120; };
            v1 = { x = -70; y = 30; z =  -5; };
            v2 = { x =  70; y = 30; z =  -5; };
            material = {
                type = "Color";
                color = { r = 255; g = 60; b = 60; };
                reflectivity = 0.2;
            };
        },
        # Face gauche bleue
        {
            v0 = { x = 0;   y = 30; z = 120; };
            v1 = { x = -70; y = 30; z =  -5; };
            v2 = { x = 0;   y = 130; z =  40; };
            material = {
                type = "Color";
                color = { r = 60; g = 80; b = 255; };
                reflectivity = 0.2;
            };
        },
        # Face droite verte
        {
            v0 = { x = 0;  y = 30; z = 120; };
            v1 = { x = 70; y = 30; z =  -5; };
            v2 = { x = 0;  y = 130; z =  40; };
            material = {
                type = "Color";
                color = { r = 60; g = 220; b = 80; };
                reflectivity = 0.2;
            };
        },
        # Base jaune translucide
        {
            v0 = { x = -70; y = 30;  z = -5; };
            v1 = { x =  70; y = 30;  z = -5; };
            v2 = { x =   0; y = 130; z = 40; };
            material = {
                type = "Color";
                color = { r = 255; g = 210; b = 30; };
                reflectivity = 0.15;
            };
        },
        # Triangles satellite — gauche (magenta)
        {
            v0 = { x = -140; y = 50; z = 90; };
            v1 = { x = -200; y = 50; z = 10; };
            v2 = { x = -100; y = 50; z = 10; };
            material = {
                type = "Color";
                color = { r = 220; g = 50; b = 200; };
                reflectivity = 0.25;
            };
        },
        # Triangles satellite — droite (cyan)
        {
            v0 = { x = 140; y = 50; z = 90; };
            v1 = { x = 100; y = 50; z = 10; };
            v2 = { x = 200; y = 50; z = 10; };
            material = {
                type = "Color";
                color = { r = 50; g = 220; b = 220; };
                reflectivity = 0.25;
            };
        },
        # Petit triangle flottant haut (blanc/or)
        {
            v0 = { x =  0;  y = 10; z = 160; };
            v1 = { x = -30; y = 10; z = 115; };
            v2 = { x =  30; y = 10; z = 115; };
            material = {
                type = "Color";
                color = { r = 255; g = 230; b = 100; };
                reflectivity = 0.3;
            };
        }
    );

    planes = (
        {
            axis = "Z";
            position = -15;
            material = {
                type = "Chessboard";
                scale = 28;
                color1 = { r = 210; g = 210; b = 215; };
                color2 = { r = 30; g = 30; b = 40; };
                reflectivity = 0.3;
            };
        },
        {
            axis = "Y";
            position = 280;
            material = {
                type = "Color";
                color = { r = 10; g = 10; b = 20; };
                reflectivity = 0.0;
            };
        }
    );
};

background = { r = 5; g = 5; b = 12; };

lights:
{
    ambient = 0.3;
    diffuse = 1.0;

    point = (
        {
            x = 0;
            y = -200;
            z = 400;
            intensity = 1.0;
            phong = 64;
        },
        {
            x = 220;
            y = -80;
            z = 250;
            intensity = 0.4;
            color = { r = 200; g = 220; b = 255; };
            phong = 32;
        }
    );

    directional = (
        {
            x = -0.5;
            y = 0.8;
            z = 0.8;
        }
    );
};
