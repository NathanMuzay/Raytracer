# Mandelbulb fractal showcase scene
camera:
{
    resolution = { width = 1920; height = 1080; };
    position   = { x = 0; y = -220; z = 30; };
    rotation   = { x = 0; y = 0; z = 0; };
    fieldOfView = 65.0;
    antialiasing = 2;
    fog = {
        start = 150.0;
        density = 0.006;
        color = { r = 5; g = 5; b = 15; };
    };
};

primitives:
{
    fractals = (
        # Centre - Mandelbulb classique power=8, grande taille, nacré
        {
            x = 0; y = 0; z = 20;
            scale = 55.0;
            power = 8;
            iterations = 10;
            bailout = 2.0;
            rotation = { x = 15; y = 30; z = 0; };
            material = {
                type = "Color";
                color = { r = 200; g = 210; b = 255; };
                reflectivity = 0.25;
            };
        },
        # Gauche - power=3 (forme très différente, style bulbe tordu), orange
        {
            x = -130; y = 40; z = -5;
            scale = 38.0;
            power = 3;
            iterations = 10;
            bailout = 2.0;
            rotation = { x = 0; y = -40; z = 20; };
            material = {
                type = "Color";
                color = { r = 255; g = 130; b = 40; };
                reflectivity = 0.1;
            };
        },
        # Droite - power=5 (forme intermédiaire), vert émeraude
        {
            x = 135; y = 55; z = -5;
            scale = 38.0;
            power = 5;
            iterations = 10;
            bailout = 2.0;
            rotation = { x = -10; y = 50; z = -15; };
            material = {
                type = "Color";
                color = { r = 50; g = 200; b = 100; };
                reflectivity = 0.1;
            };
        }
    );

    planes = (
        {
            axis = "Z";
            position = -25;
            material = {
                type = "Color";
                color = { r = 15; g = 15; b = 30; };
                reflectivity = 0.4;
            };
        }
    );
};

background:
{
    r = 2; g = 2; b = 8;
};

lights:
{
    ambient = 0.2;
    diffuse = 1.0;

    point = (
        {
            x = 100;
            y = -120;
            z = 350;
            phong = 32;
        },
        {
            x = -180;
            y = 80;
            z = 200;
            phong = 16;
        }
    );

    directional = (
        {
            x = 0.3;
            y = 0.8;
            z = 1.0;
        }
    );
};