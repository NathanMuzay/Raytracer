# grand_showcase.cfg
# GRAND SHOWCASE — Toutes les features dans une seule scène
# Matériaux : Color, Chessboard, PerlinNoise, Texture
# Primitives : Sphere, Cylinder, Cone, Cube, Torus, Tanglecube, Triangle, Moebius, Fractal
# Lumières : Point colorées + Directional + Phong
# Effets : Fog, Antialiasing, Réflexions

camera:
{
    resolution = { width = 1920; height = 1080; };
    position   = { x = 0; y = -380; z = 130; };
    rotation   = { x = 0; y = 0; z = 0; };
    fieldOfView = 82.0;
    antialiasing = 2;
    fog = {
        start = 500.0;
        density = 0.002;
        color = { r = 5; g = 5; b = 12; };
    };
};

