# spheres.cfg
# Showcase sphères : réflectivité graduée + lumières colorées dramatiques
# Ambiance néon/studio

background = { r = 0; g = 0; b = 0; };

camera:
{
    resolution = { width = 1920; height = 1080; };
    position   = { x = 0; y = -80; z = 15; };
    rotation   = { x = 0; y = 0; z = 0; };
    fieldOfView = 50.0;
    antialiasing = 2;
    fog = {
        start = 120.0;
        density = 0.008;
        color = { r = 0; g = 0; b = 0; };
    };
};

primitives:
{
    planes = (
        {
            axis = "Z";
            position = -10;
            material = {
                type = "Color";
                color = { r = 10; g = 10; b = 15; };
                reflectivity = 0.5;
            };
        }
    );

    spheres = (
        # Grande sphère centrale — miroir coloré rose/magenta
        {
            x = 0; y = 0; z = 22;
            r = 22;
            material = {
                type = "Color";
                color = { r = 230; g = 30; b = 110; };
                reflectivity = 0.55;
            };
        },
        # Petite sphère droite — très réfléchissante (quasi miroir)
        {
            x = 32; y = 22; z = 6;
            r = 6;
            material = {
                type = "Color";
                color = { r = 50; g = 50; b = 60; };
                reflectivity = 0.88;
            };
        },
        # Sphère gauche — moins réfléchissante, couleur vive
        {
            x = -28; y = 15; z = 10;
            r = 10;
            material = {
                type = "Color";
                color = { r = 40; g = 180; b = 255; };
                reflectivity = 0.35;
            };
        }
    );
};

lights:
{
    ambient = 0.5;
    diffuse = 0.85;

    point = (
        {
            x = -25; y = 5; z = 8;
            intensity = 0.48;
            color = { r = 255; g = 80; b = 100; };
            phong = 128;
        },
        {
            x = 25; y = 8; z = 10;
            intensity = 0.45;
            color = { r = 80; g = 255; b = 130; };
            phong = 128;
        },
        {
            x = 0; y = -30; z = 35;
            intensity = 0.38;
            color = { r = 120; g = 160; b = 255; };
            phong = 64;
        }
    );

    directional = ();
};
