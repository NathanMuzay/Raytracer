# demo_materials.cfg
# Showcase des matériaux : Color/reflectivity, Chessboard, PerlinNoise, Texture
# 4 sphères identiques, chacune avec un matériau différent

camera:
{
    resolution = { width = 1920; height = 1080; };
    position   = { x = 0; y = -200; z = 80; };
    rotation   = { x = 0; y = 0; z = 0; };
    fieldOfView = 70.0;
    antialiasing = 2;
};

primitives:
{
    spheres = (
        # 1 - Couleur unie + haute réflectivité (miroir teinté bleu)
        {
            x = -195; y = 80; z = 40;
            r = 40;
            material = {
                type = "Color";
                color = { r = 180; g = 200; b = 255; };
                reflectivity = 0.75;
            };
        },
        # 2 - Chessboard procédural
        {
            x = -65; y = 80; z = 40;
            r = 40;
            material = {
                type = "Chessboard";
                scale = 20;
                color1 = { r = 240; g = 240; b = 240; };
                color2 = { r = 20; g = 20; b = 20; };
                reflectivity = 0.1;
            };
        },
        # 3 - Perlin Noise procédural (marbre)
        {
            x = 65; y = 80; z = 40;
            r = 40;
            material = {
                type = "PerlinNoise";
                scale = 25.0;
                persistence = 0.55;
                octaves = 6;
                color1 = { r = 210; g = 180; b = 140; };
                color2 = { r = 60; g = 35; b = 20; };
            };
        },
        # 4 - Texture depuis fichier (planète Terre)
        {
            x = 195; y = 80; z = 40;
            r = 40;
            material = {
                type = "Texture";
                path = "assets/textures/earth.jpg";
                reflectivity = 0.08;
            };
        }
    );

    # Sol miroir pour voir les reflets de la sphère miroir
    planes = (
        {
            axis = "Z";
            position = 0;
            material = {
                type = "Color";
                color = { r = 30; g = 30; b = 40; };
                reflectivity = 0.35;
            };
        },
        {
            axis = "Y";
            position = 280;
            material = {
                type = "Color";
                color = { r = 15; g = 15; b = 25; };
                reflectivity = 0.0;
            };
        }
    );
};

background = { r = 8; g = 8; b = 15; };

lights:
{
    ambient = 0.2;
    diffuse = 1.0;

    point = (
        {
            x = 0;
            y = -180;
            z = 350;
            intensity = 1.0;
            phong = 128;
        },
        {
            x = -300;
            y = 0;
            z = 250;
            intensity = 0.4;
            color = { r = 180; g = 200; b = 255; };
            phong = 32;
        },
        {
            x = 300;
            y = 0;
            z = 250;
            intensity = 0.4;
            color = { r = 255; g = 200; b = 160; };
            phong = 32;
        }
    );

    directional = ();
};
