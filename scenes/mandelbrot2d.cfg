# Mandelbrot 2D Set - Fractale classique sur le plan complexe
camera:
{
    resolution = { width = 1200; height = 900; };
    position   = { x = 0; y = -300; z = 0; };
    rotation   = { x = 0; y = 0; z = 0; };
    fieldOfView = 60.0;
    antialiasing = 2;
};

primitives:
{
    mandelbrot2d = (
        {
            # Position du centre du "tableau" fractal dans la scène
            x = 0; y = 0; z = 0;
            width = 400.0;   # Largeur du plan fractal dans la scène
            height = 300.0;  # Hauteur du plan fractal dans la scène
            # Fenêtre complexe à afficher (classique)
            minRe = -2.0;
            maxRe = 1.0;
            minIm = -1.2;
            maxIm = 1.2;
            maxIter = 100;
            # Optionnel : palette/couleur
            colorInside = { r = 0; g = 0; b = 0; };
            colorOutside = { r = 255; g = 180; b = 40; };
        }
    );

    planes = (
        {
            axis = "Z";
            position = -10;
            material = {
                type = "Color";
                color = { r = 30; g = 30; b = 40; };
                reflectivity = 0.2;
            };
        }
    );
};

lights:
{
    ambient = 0.5;
    diffuse = 0.8;
    point = (
        {
            x = 200;
            y = -200;
            z = 200;
            phong = 64;
        }
    );
    directional = ();
};

background = { r = 10; g = 10; b = 20; };
