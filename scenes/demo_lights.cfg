# demo_lights.cfg — Showcase lumières colorées RGB + modèle Phong
# Sol blanc mat : les ombres colorées s'y impriment nettement

camera:
{
    resolution   = { width = 1920; height = 1080; };
    position     = { x = 0; y = -200; z = 65; };
    rotation     = { x = 0; y = 0; z = 0; };
    fieldOfView  = 72.0;
    antialiasing = 2;
};

background = { r = 4; g = 4; b = 8; };

primitives:
{
    spheres = (
        # Centrale blanche mate — reçoit les 3 couleurs
        {
            x = 0; y = 100; z = 45; r = 45;
            material = {
                type         = "Color";
                color        = { r = 245; g = 245; b = 245; };
                reflectivity = 0.04;
            };
        },
        # Gauche — semi-miroir pour diffuser la lumière rouge
        {
            x = -160; y = 120; z = 32; r = 32;
            material = {
                type         = "Color";
                color        = { r = 210; g = 210; b = 215; };
                reflectivity = 0.35;
            };
        },
        # Droite — semi-miroir pour diffuser la lumière verte
        {
            x = 160; y = 120; z = 32; r = 32;
            material = {
                type         = "Color";
                color        = { r = 210; g = 215; b = 210; };
                reflectivity = 0.35;
            };
        },
        # Petite sphère haute — ombre portée croisée
        {
            x = 0; y = 55; z = 100; r = 20;
            material = {
                type         = "Color";
                color        = { r = 225; g = 225; b = 225; };
                reflectivity = 0.08;
            };
        }
    );

    cubes = (
        # Cube gauche — caster une ombre rectangulaire
        {
            x = -255; y = 140; z = 28;
            sizeX = 44; sizeY = 44; sizeZ = 44;
            rotation = { x = 0; y = 18; z = 0; };
            material = {
                type         = "Color";
                color        = { r = 165; g = 165; b = 180; };
                reflectivity = 0.05;
            };
        }
    );

    planes = (
        # Sol blanc mat — indispensable pour les ombres colorées
        {
            axis     = "Z";
            position = 0;
            material = {
                type         = "Color";
                color        = { r = 242; g = 242; b = 248; };
                reflectivity = 0.0;
            };
        },
        {
            axis     = "Y";
            position = 360;
            material = {
                type  = "Color";
                color = { r = 18; g = 18; b = 28; };
            };
        }
    );
};

lights:
{
    ambient = 0.04;
    diffuse = 1.0;

    point = (
        # Lumière ROUGE — gauche bas
        {
            x = -300; y = -60; z = 220;
            intensity = 1.0;
            color     = { r = 255; g = 45; b = 45; };
            phong     = 128;
        },
        # Lumière VERTE — droite bas
        {
            x = 300; y = -60; z = 220;
            intensity = 1.0;
            color     = { r = 45; g = 255; b = 85; };
            phong     = 128;
        },
        # Lumière BLEUE — dessus centre
        {
            x = 0; y = -40; z = 420;
            intensity = 0.75;
            color     = { r = 75; g = 115; b = 255; };
            phong     = 64;
        }
    );

    directional = ();
};
