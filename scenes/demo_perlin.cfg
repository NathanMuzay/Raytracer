# demo_perlin.cfg
# Showcase matériau PerlinNoise sur toutes les primitives qui le supportent

camera:
{
    resolution = { width = 1920; height = 1080; };
    position   = { x = 0; y = -200; z = 80; };
    rotation   = { x = 0; y = 0; z = 0; };
    fieldOfView = 72.0;
    antialiasing = 2;
};

background = { r = 8; g = 6; b = 15; };

primitives:
{
    spheres = (
        # Marbre blanc/gris
        {
            x = -200; y = 90; z = 40; r = 38;
            material = {
                type = "PerlinNoise";
                scale = 18.0; persistence = 0.55; octaves = 6;
                color1 = { r = 230; g = 230; b = 230; };
                color2 = { r = 60; g = 60; b = 70; };
            };
        },
        # Marbre rouge/noir
        {
            x = -80; y = 90; z = 40; r = 38;
            material = {
                type = "PerlinNoise";
                scale = 22.0; persistence = 0.6; octaves = 5;
                color1 = { r = 220; g = 50; b = 30; };
                color2 = { r = 20; g = 5; b = 5; };
            };
        },
        # Bois
        {
            x = 40; y = 90; z = 40; r = 38;
            material = {
                type = "PerlinNoise";
                scale = 8.0; persistence = 0.5; octaves = 4;
                color1 = { r = 180; g = 110; b = 50; };
                color2 = { r = 80; g = 40; b = 15; };
            };
        },
        # Jade / vert profond
        {
            x = 160; y = 90; z = 40; r = 38;
            material = {
                type = "PerlinNoise";
                scale = 30.0; persistence = 0.45; octaves = 7;
                color1 = { r = 100; g = 200; b = 140; };
                color2 = { r = 10; g = 60; b = 40; };
            };
        }
    );

    cylindres = (
        # Colonne marbre
        {
            x = -200; y = 90; z = 0; r = 15; h = 80;
            material = {
                type = "PerlinNoise";
                scale = 12.0; persistence = 0.5; octaves = 5;
                color1 = { r = 210; g = 195; b = 170; };
                color2 = { r = 80; g = 65; b = 45; };
            };
        },
        {
            x = 160; y = 90; z = 0; r = 15; h = 80;
            material = {
                type = "PerlinNoise";
                scale = 12.0; persistence = 0.5; octaves = 5;
                color1 = { r = 210; g = 195; b = 170; };
                color2 = { r = 80; g = 65; b = 45; };
            };
        }
    );

    planes = (
        {
            axis = "Z";
            position = 0;
            material = {
                type = "PerlinNoise";
                scale = 40.0; persistence = 0.4; octaves = 4;
                color1 = { r = 140; g = 130; b = 120; };
                color2 = { r = 40; g = 35; b = 30; };
            };
        },
        {
            axis = "Y";
            position = 280;
            material = {
                type = "PerlinNoise";
                scale = 35.0; persistence = 0.45; octaves = 4;
                color1 = { r = 50; g = 45; b = 70; };
                color2 = { r = 15; g = 12; b = 25; };
            };
        }
    );
};

lights:
{
    ambient = 0.2;
    diffuse = 1.0;

    point = (
        {
            x = 0; y = -50; z = 200;
            intensity = 1.6;
            color = { r = 255; g = 245; b = 220; };
            phong = 128;
        },
        {
            x = -300; y = 50; z = 120;
            intensity = 0.4;
            color = { r = 150; g = 180; b = 255; };
            phong = 32;
        }
    );

    directional = ();
};
