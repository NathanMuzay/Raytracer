# demo_reflections.cfg
# Showcase de la réflectivité :
# - Sol miroir
# - Sphères avec différents niveaux de reflectivity (0 → 0.9)
# - Réflexions mutuelles entre objets

camera:
{
    resolution = { width = 1920; height = 1080; };
    position   = { x = 0; y = -150; z = 55; };
    rotation   = { x = 0; y = 0; z = 0; };
    fieldOfView = 68.0;
    antialiasing = 2;
    fog = {
        start = 400.0;
        density = 0.002;
    };
};

primitives:
{
    spheres = (
        # Miroir parfait (reflectivity = 0.95)
        {
            x = -160; y = 100; z = 35;
            r = 35;
            material = {
                type = "Color";
                color = { r = 240; g = 245; b = 255; };
                reflectivity = 0.95;
            };
        },
        # Semi-miroir (0.6) — teinte dorée
        {
            x = -60; y = 80; z = 28;
            r = 28;
            material = {
                type = "Color";
                color = { r = 255; g = 200; b = 80; };
                reflectivity = 0.6;
            };
        },
        # Légèrement réfléchissant (0.3) — rouge
        {
            x = 40; y = 80; z = 28;
            r = 28;
            material = {
                type = "Color";
                color = { r = 220; g = 70; b = 70; };
                reflectivity = 0.3;
            };
        },
        # Mate (0.0) — vert
        {
            x = 140; y = 80; z = 28;
            r = 28;
            material = {
                type = "Color";
                color = { r = 70; g = 200; b = 100; };
                reflectivity = 0.0;
            };
        },
        # Grande sphère miroir au fond — crée des réflexions infinies
        {
            x = 50; y = 350; z = 80;
            r = 80;
            material = {
                type = "Color";
                color = { r = 220; g = 220; b = 255; };
                reflectivity = 0.88;
            };
        }
    );

    planes = (
        # Sol très réfléchissant — effet miroir au sol
        {
            axis = "Z";
            position = 0;
            material = {
                type = "Color";
                color = { r = 15; g = 15; b = 25; };
                reflectivity = 0.7;
            };
        },
        # Mur gauche teinté
        {
            axis = "X";
            position = -280;
            material = {
                type = "Color";
                color = { r = 30; g = 20; b = 50; };
                reflectivity = 0.15;
            };
        },
        # Mur droit teinté
        {
            axis = "X";
            position = 280;
            material = {
                type = "Color";
                color = { r = 20; g = 30; b = 50; };
                reflectivity = 0.15;
            };
        }
    );
};

background = { r = 5; g = 5; b = 12; };

lights:
{
    ambient = 0.15;
    diffuse = 1.0;

    point = (
        {
            x = 0;
            y = -100;
            z = 400;
            intensity = 1.0;
            color = { r = 255; g = 245; b = 220; };
            phong = 256;
        },
        {
            x = -200;
            y = 200;
            z = 250;
            intensity = 0.35;
            color = { r = 150; g = 170; b = 255; };
            phong = 32;
        },
        {
            x = 200;
            y = 200;
            z = 250;
            intensity = 0.35;
            color = { r = 255; g = 200; b = 150; };
            phong = 32;
        }
    );

    directional = ();
};
