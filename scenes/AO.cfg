# AO.cfg
# Showcase de l'Ambient Occlusion
# Stratégie : objets très proches du sol et entre eux, coins serrés, empilements
# → Les zones de contact/crevasse deviennent très sombres = AO visible au premier coup d'œil
# Éclairage intentionnellement doux et uniforme pour que l'AO domine

camera:
{
    resolution = { width = 1920; height = 1080; };
    position   = { x = 0; y = -280; z = 110; };
    rotation   = { x = 12; y = 0; z = 0; };
    fieldOfView = 68.0;
    antialiasing = 2;
};

primitives:
{
    spheres = (
        # --- GROUPE CENTRE : sphères empilées ---
        # Grande sphère du bas
        {
            x = 0; y = 100; z = 55;
            r = 55;
            material = {
                type = "Color";
                color = { r = 230; g = 220; b = 205; };
                reflectivity = 0.0;
            };
        },
        # Sphère moyenne posée dessus
        {
            x = 0; y = 80; z = 143;
            r = 33;
            material = {
                type = "Color";
                color = { r = 225; g = 215; b = 200; };
                reflectivity = 0.0;
            };
        },
        # Petite sphère au sommet
        {
            x = 0; y = 65; z = 196;
            r = 18;
            material = {
                type = "Color";
                color = { r = 220; g = 210; b = 195; };
                reflectivity = 0.0;
            };
        },

        # --- GROUPE GAUCHE : sphères très serrées entre elles ---
        {
            x = -155; y = 90; z = 40;
            r = 40;
            material = {
                type = "Color";
                color = { r = 225; g = 215; b = 200; };
                reflectivity = 0.0;
            };
        },
        # Sphère collée à gauche — contact avec la précédente
        {
            x = -240; y = 90; z = 30;
            r = 30;
            material = {
                type = "Color";
                color = { r = 220; g = 210; b = 195; };
                reflectivity = 0.0;
            };
        },
        # Petite sphère coincée entre les deux + sol
        {
            x = -198; y = 90; z = 12;
            r = 12;
            material = {
                type = "Color";
                color = { r = 215; g = 205; b = 190; };
                reflectivity = 0.0;
            };
        },

        # --- GROUPE DROITE : idem miroir ---
        {
            x = 155; y = 90; z = 40;
            r = 40;
            material = {
                type = "Color";
                color = { r = 225; g = 215; b = 200; };
                reflectivity = 0.0;
            };
        },
        {
            x = 240; y = 90; z = 30;
            r = 30;
            material = {
                type = "Color";
                color = { r = 220; g = 210; b = 195; };
                reflectivity = 0.0;
            };
        },
        # Petite sphère coincée droite
        {
            x = 198; y = 90; z = 12;
            r = 12;
            material = {
                type = "Color";
                color = { r = 215; g = 205; b = 190; };
                reflectivity = 0.0;
            };
        },

        # --- FOND : rangée serrée de sphères proches du mur ---
        { x = -180; y = 300; z = 20; r = 20;
          material = { type = "Color"; color = { r = 218; g = 208; b = 193; }; reflectivity = 0.0; }; },
        { x = -100; y = 300; z = 25; r = 25;
          material = { type = "Color"; color = { r = 220; g = 210; b = 195; }; reflectivity = 0.0; }; },
        { x = 0;    y = 300; z = 28; r = 28;
          material = { type = "Color"; color = { r = 222; g = 212; b = 197; }; reflectivity = 0.0; }; },
        { x = 100;  y = 300; z = 25; r = 25;
          material = { type = "Color"; color = { r = 220; g = 210; b = 195; }; reflectivity = 0.0; }; },
        { x = 180;  y = 300; z = 20; r = 20;
          material = { type = "Color"; color = { r = 218; g = 208; b = 193; }; reflectivity = 0.0; }; }
    );

    cubes = (
        # Cubes empilés — les arêtes créent des coins très serrés, AO très marqué
        # Base gauche
        {
            x = -310; y = 180; z = 25;
            sizeX = 50; sizeY = 50; sizeZ = 50;
            rotation = { x = 0; y = 0; z = 0; };
            material = {
                type = "Color";
                color = { r = 222; g = 212; b = 197; };
                reflectivity = 0.0;
            };
        },
        # Cube posé dessus, légèrement décalé
        {
            x = -318; y = 168; z = 83;
            sizeX = 36; sizeY = 36; sizeZ = 36;
            rotation = { x = 0; y = 8; z = 0; };
            material = {
                type = "Color";
                color = { r = 218; g = 208; b = 193; };
                reflectivity = 0.0;
            };
        },
        # Base droite
        {
            x = 310; y = 180; z = 25;
            sizeX = 50; sizeY = 50; sizeZ = 50;
            rotation = { x = 0; y = 0; z = 0; };
            material = {
                type = "Color";
                color = { r = 222; g = 212; b = 197; };
                reflectivity = 0.0;
            };
        },
        # Cube posé dessus, légèrement décalé
        {
            x = 318; y = 168; z = 83;
            sizeX = 36; sizeY = 36; sizeZ = 36;
            rotation = { x = 0; y = -8; z = 0; };
            material = {
                type = "Color";
                color = { r = 218; g = 208; b = 193; };
                reflectivity = 0.0;
            };
        },
        # Petit cube coincé contre le mur gauche + sol
        {
            x = -340; y = 280; z = 15;
            sizeX = 30; sizeY = 30; sizeZ = 30;
            rotation = { x = 0; y = 0; z = 0; };
            material = {
                type = "Color";
                color = { r = 215; g = 205; b = 190; };
                reflectivity = 0.0;
            };
        },
        # Idem droite
        {
            x = 340; y = 280; z = 15;
            sizeX = 30; sizeY = 30; sizeZ = 30;
            rotation = { x = 0; y = 0; z = 0; };
            material = {
                type = "Color";
                color = { r = 215; g = 205; b = 190; };
                reflectivity = 0.0;
            };
        }
    );

    planes = (
        # Sol mat clair — AO visible en foncé au contact des objets
        {
            axis = "Z";
            position = 0;
            material = {
                type = "Color";
                color = { r = 238; g = 233; b = 223; };
                reflectivity = 0.0;
            };
        },
        # Mur fond
        {
            axis = "Y";
            position = 380;
            material = {
                type = "Color";
                color = { r = 230; g = 225; b = 215; };
                reflectivity = 0.0;
            };
        },
        # Mur gauche — les cubes sont contre lui
        {
            axis = "X";
            position = -380;
            material = {
                type = "Color";
                color = { r = 230; g = 225; b = 215; };
                reflectivity = 0.0;
            };
        },
        # Mur droit
        {
            axis = "X";
            position = 380;
            material = {
                type = "Color";
                color = { r = 230; g = 225; b = 215; };
                reflectivity = 0.0;
            };
        },
        # Plafond
        {
            axis = "Z";
            position = 280;
            material = {
                type = "Color";
                color = { r = 242; g = 240; b = 235; };
                reflectivity = 0.0;
            };
        }
    );
};

background = { r = 238; g = 233; b = 223; };

lights:
{
    # Ambiance forte + diffuse modérée : l'éclairage est volontairement uniforme
    # pour que ce soit l'AO seul qui crée les ombres de contact, pas les lumières directes
    ambient = 0.6;
    diffuse = 0.75;

    point = (
        # Lumière principale très douce (phong bas = highlight large = éclairage soft)
        {
            x = 0;
            y = -100;
            z = 350;
            intensity = 0.85;
            color = { r = 255; g = 252; b = 245; };
            phong = 4;
        },
        # Fill latéral gauche — évite les ombres dures
        {
            x = -400;
            y = 100;
            z = 250;
            intensity = 0.35;
            color = { r = 245; g = 248; b = 255; };
            phong = 2;
        },
        # Fill latéral droit
        {
            x = 400;
            y = 100;
            z = 250;
            intensity = 0.35;
            color = { r = 255; g = 248; b = 240; };
            phong = 2;
        }
    );

    directional = ();

    ao = {
        samples = 128;
        radius = 80.0;
        intensity = 1.4;
    };
};
