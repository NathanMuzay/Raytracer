background = { r = 240; g = 238; b = 232; };

lights:
{
    ambient = 0.55;
    diffuse = 0.85;

    point = (
        # Lumière principale haute — douce et large pour laisser l'AO dominer
        {
            x = 0;
            y = 0;
            z = 280;
            intensity = 0.9;
            color = { r = 255; g = 250; b = 240; };
            phong = 8;
        },
        # Fill léger depuis l'avant
        {
            x = 0;
            y = -300;
            z = 180;
            intensity = 0.3;
            color = { r = 240; g = 240; b = 255; };
            phong = 4;
        }
    );

    directional = ();

    ao = {
        samples = 128;
        radius = 90.0;
        intensity = 1.2;
    };
};
