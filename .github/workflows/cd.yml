name: CI 

on:
  push:
    branches: [main, KAN-19]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y build-essential libconfig++-dev libsfml-dev

      - name: Compile
        run: make

      - name: Run program
        run: ./raytracer scenes/example.cfg

      - name: Clean
        run: make clean
