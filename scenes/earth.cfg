# Earth closeup - sky2 background (eau en dessous)
camera:
{
    resolution = { width = 1920; height = 1080; };
    position   = { x = 0; y = -300; z = 50; };
    rotation   = { x = 0; y = 0; z = 0; };
    fieldOfView = 75.0;
    antialiasing = 2;
};

primitives:
{
    spheres = (
        # Terre
        {
            x = 0; y = 0; z = 0; r = 100;
            material = {
                type = "Texture";
                path = "assets/textures/earth.jpg";
                reflectivity = 0.15;
            };
        },
        # Lune
        {
            x = 180; y = 0; z = 30; r = 27;
            material = {
                type = "Texture";
                path = "assets/textures/moon.jpg";
                reflectivity = 0.05;
            };
        }
    );

    # Pas de plan Z -> sky2 avec eau en dessous utilisé comme fond
    planes = (
        {
            axis = "Y";
            position = 700;
            material = {
                type = "Texture";
                path = "assets/textures/sky2.png";
                reflectivity = 0.0;
            };
        }
    );
};

lights:
{
    ambient = 0.9;
    diffuse = 1.0;

    point = (
        {
            x = -400;
            y = -600;
            z = 300;
            intensity = 1.8;
            color = { r = 255; g = 255; b = 240; };
            phong = 32;
        }
    );

    directional = ();
};
