# Configuration of the camera
camera:
{
    resolution = { width = 1920; height = 1080; };
    position   = { x = 0; y = -100; z = 20; };
    rotation   = { x = 0; y = 0; z = 0; };
    fieldOfView = 72.0;
    fog = {
        start = 120.0
        density = 0.01;
    };
    antialiasing = 2
};

primitives:
{
    spheres = (
        {
            x = -70;
            y = -25;
            z = 20;
            r = 40;
            material = {
                type = "Color";
                color = { r = 64; g = 64; b = 255; };
                reflectivity = 0.1;
            };
        },
        {
            x = 0;
            y = 20;
            z = 20;
            r = 40;
            material = {
                type = "Color";
                color = { r = 64; g = 255; b = 64; };
                reflectivity = 0.1;
            };
        },
        {
            x = 95;
            y = 60;
            z = 20;
            r = 40;
            material = {
                type = "Color";
                color = { r = 255; g = 64; b = 64; };
                reflectivity = 0.1;
            };
        }
    );

    planes = (
        {
            axis = "Z";
            position = -20;
            material = {
                type = "Chessboard"
                scale = 20
                reflectivity = 0.3;
            };
        }
    );
};

lights:
{
    ambient = 0.5;      # Réduit pour plus de contraste (solidité)
    diffuse = 1.0;       # Augmenté pour bien éclairer les sphères

    point = (
        {
            x = 200;
            y = 50;
            z = 500;
            phong = 128;
        }
    );

    directional = (
        {
            x = 1;
            y = 1;
            z = 1;
            #phong = 128
        }
    );

    #ao = {
    #    samples = 128;
    #    radius = 90.0;
