# cubes.cfg
# Showcase cubes : architecture géométrique avec Perlin + réflexions

camera:
{
    resolution = { width = 1920; height = 1080; };
    position   = { x = 0; y = -200; z = 80; };
    rotation   = { x = 0; y = 0; z = 0; };
    fieldOfView = 72.0;
    antialiasing = 2;
};

background = { r = 8; g = 8; b = 18; };

primitives:
{
    cubes = (
        # Grand cube central — marbre Perlin
        {
            x = 0; y = 120; z = 40;
            sizeX = 60; sizeY = 60; sizeZ = 60;
            rotation = { x = 0; y = 0; z = 25; };
            material = {
                type = "PerlinNoise";
                scale = 20.0;
                persistence = 0.55;
                octaves = 6;
                color1 = { r = 210; g = 190; b = 160; };
                color2 = { r = 50; g = 35; b = 20; };
            };
        },
        # Cube gauche — miroir teinté bleu
        {
            x = -130; y = 100; z = 25;
            sizeX = 40; sizeY = 40; sizeZ = 40;
            rotation = { x = 10; y = 0; z = -15; };
            material = {
                type = "Color";
                color = { r = 100; g = 150; b = 255; };
                reflectivity = 0.7;
            };
        },
        # Cube droit — miroir teinté rose
        {
            x = 130; y = 100; z = 25;
            sizeX = 40; sizeY = 40; sizeZ = 40;
            rotation = { x = -10; y = 0; z = 15; };
            material = {
                type = "Color";
                color = { r = 255; g = 100; b = 180; };
                reflectivity = 0.7;
            };
        },
        # Petit cube avant-gauche
        {
            x = -60; y = 20; z = 12;
            sizeX = 22; sizeY = 22; sizeZ = 22;
            rotation = { x = 20; y = 0; z = 40; };
            material = {
                type = "Chessboard";
                scale = 12;
                color1 = { r = 240; g = 240; b = 240; };
                color2 = { r = 20; g = 20; b = 20; };
                reflectivity = 0.2;
            };
        },
        # Petit cube avant-droit
        {
            x = 60; y = 20; z = 12;
            sizeX = 22; sizeY = 22; sizeZ = 22;
            rotation = { x = -20; y = 0; z = -40; };
            material = {
                type = "Color";
                color = { r = 80; g = 220; b = 160; };
                reflectivity = 0.4;
            };
        },
        # Socle plat sous le grand cube
        {
            x = 0; y = 120; z = 5;
            sizeX = 100; sizeY = 100; sizeZ = 8;
            rotation = { x = 0; y = 0; z = 0; };
            material = {
                type = "Color";
                color = { r = 180; g = 180; b = 200; };
                reflectivity = 0.5;
            };
        }
    );

    planes = (
        {
            axis = "Z";
            position = -5;
            material = {
                type = "Chessboard";
                scale = 50;
                color1 = { r = 180; g = 180; b = 195; };
                color2 = { r = 30; g = 30; b = 40; };
                reflectivity = 0.3;
            };
        },
        {
            axis = "Y";
            position = 320;
            material = {
                type = "Texture";
                path = "assets/textures/sky.png";
            };
        }
    );
};

lights:
{
    ambient = 1.0;
    diffuse = 1.0;

    point = (
        {
            x = 0; y = -50; z = 200;
            intensity = 1.6;
            color = { r = 255; g = 245; b = 220; };
            phong = 128;
        },
        {
            x = -250; y = 100; z = 120;
            intensity = 0.5;
            color = { r = 80; g = 100; b = 255; };
            phong = 32;
        },
        {
            x = 250; y = 100; z = 120;
            intensity = 0.5;
            color = { r = 255; g = 80; b = 80; };
            phong = 32;
        }
    );

    directional = ();
};
