camera:
{
    resolution = { width = 1920; height = 1080; };
    position   = { x = 0; y = -200; z = 60; };
    rotation   = { x = 15; y = 0; z = 0; };
    fieldOfView = 65.0;
    antialiasing = 2;
};

primitives:
{
    spheres = (
        # Grosse sphère centrale
        {
            x = 0; y = 120; z = 60;
            r = 60;
            material = {
                type = "Color";
                color = { r = 220; g = 215; b = 200; };
                reflectivity = 0.05;
            };
        },
        # Sphère gauche — collée au sol
        {
            x = -140; y = 100; z = 35;
            r = 35;
            material = {
                type = "Color";
                color = { r = 210; g = 200; b = 185; };
                reflectivity = 0.05;
            };
        },
        # Sphère droite — collée au sol
        {
            x = 140; y = 100; z = 35;
            r = 35;
            material = {
                type = "Color";
                color = { r = 210; g = 200; b = 185; };
                reflectivity = 0.05;
            };
        },
        # Petite sphère très collée au sol gauche
        {
            x = -240; y = 80; z = 18;
            r = 18;
            material = {
                type = "Color";
                color = { r = 200; g = 190; b = 175; };
                reflectivity = 0.05;
            };
        },
        # Petite sphère très collée au sol droite
        {
            x = 240; y = 80; z = 18;
            r = 18;
            material = {
                type = "Color";
                color = { r = 200; g = 190; b = 175; };
                reflectivity = 0.05;
            };
        },
        # Toute petite sphère dans le coin gauche — AO très visible
        {
            x = -310; y = 200; z = 10;
            r = 10;
            material = {
                type = "Color";
                color = { r = 195; g = 185; b = 170; };
                reflectivity = 0.0;
            };
        },
        # Toute petite sphère dans le coin droit — AO très visible
        {
            x = 310; y = 200; z = 10;
            r = 10;
            material = {
                type = "Color";
                color = { r = 195; g = 185; b = 170; };
                reflectivity = 0.0;
            };
        },
        # Sphère fond gauche
        {
            x = -80; y = 280; z = 22;
            r = 22;
            material = {
                type = "Color";
                color = { r = 205; g = 195; b = 180; };
                reflectivity = 0.0;
            };
        },
        # Sphère fond droite
        {
            x = 80; y = 280; z = 22;
            r = 22;
            material = {
                type = "Color";
                color = { r = 205; g = 195; b = 180; };
                reflectivity = 0.0;
            };
        }
    );

    planes = (
        # Sol mat — AO très visible dessous les sphères
        {
            axis = "Z";
            position = 0;
            material = {
                type = "Color";
                color = { r = 235; g = 230; b = 220; };
                reflectivity = 0.0;
            };
        },
        # Mur du fond mat
        {
            axis = "Y";
            position = 450;
            material = {
                type = "Color";
                color = { r = 225; g = 220; b = 210; };
                reflectivity = 0.0;
            };
        },
        # Mur gauche mat
        {
            axis = "X";
            position = -380;
            material = {
                type = "Color";
                color = { r = 225; g = 220; b = 210; };
