# demo_fog.cfg
# Showcase du brouillard volumétrique
# Rangée de sphères qui s'éloignent — le fog les fait disparaître progressivement
# Ambiance : nuit brumeuse

camera:
{
    resolution = { width = 1920; height = 1080; };
    position   = { x = 0; y = -80; z = 30; };
    rotation   = { x = 0; y = 0; z = 0; };
    fieldOfView = 70.0;
    antialiasing = 2;
    fog = {
        start = 80.0;
        density = 0.008;
        color = { r = 15; g = 18; b = 28; };
    };
};

primitives:
{
    spheres = (
        # Sphère très proche — nette
        { x = -60; y = 20;  z = 20; r = 18;
          material = { type = "Color"; color = { r = 255; g = 100; b = 80; }; reflectivity = 0.2; }; },
        { x = 60;  y = 20;  z = 20; r = 18;
          material = { type = "Color"; color = { r = 80; g = 150; b = 255; }; reflectivity = 0.2; }; },

        # Sphères moyennement lointaines — légèrement dans le fog
        { x = -80; y = 120; z = 20; r = 20;
          material = { type = "Color"; color = { r = 255; g = 180; b = 60; }; reflectivity = 0.15; }; },
        { x = 80;  y = 120; z = 20; r = 20;
          material = { type = "Color"; color = { r = 100; g = 220; b = 120; }; reflectivity = 0.15; }; },
        { x = 0;   y = 120; z = 30; r = 20;
          material = { type = "Color"; color = { r = 220; g = 100; b = 220; }; reflectivity = 0.15; }; },

        # Sphères lointaines — bien dans le fog
        { x = -100; y = 250; z = 22; r = 22;
          material = { type = "Color"; color = { r = 255; g = 60; b = 60; }; reflectivity = 0.1; }; },
        { x = 0;    y = 250; z = 22; r = 22;
          material = { type = "Color"; color = { r = 60; g = 200; b = 255; }; reflectivity = 0.1; }; },
        { x = 100;  y = 250; z = 22; r = 22;
          material = { type = "Color"; color = { r = 255; g = 220; b = 60; }; reflectivity = 0.1; }; },

        # Sphères très lointaines — quasi invisibles (effet de profondeur)
        { x = -120; y = 420; z = 25; r = 25;
          material = { type = "Color"; color = { r = 200; g = 200; b = 255; }; reflectivity = 0.0; }; },
        { x = 0;    y = 420; z = 25; r = 25;
          material = { type = "Color"; color = { r = 255; g = 200; b = 200; }; reflectivity = 0.0; }; },
        { x = 120;  y = 420; z = 25; r = 25;
          material = { type = "Color"; color = { r = 200; g = 255; b = 200; }; reflectivity = 0.0; }; }
    );

    cylindres = (
        # Lampadaires stylisés — pour casser la monotonie
        { x = -150; y = 60;  z = 0; r = 4; h = 60;
          material = { type = "Color"; color = { r = 80; g = 80; b = 90; }; }; },
        { x = 150;  y = 60;  z = 0; r = 4; h = 60;
          material = { type = "Color"; color = { r = 80; g = 80; b = 90; }; }; },
        { x = -170; y = 180; z = 0; r = 4; h = 60;
          material = { type = "Color"; color = { r = 80; g = 80; b = 90; }; }; },
        { x = 170;  y = 180; z = 0; r = 4; h = 60;
          material = { type = "Color"; color = { r = 80; g = 80; b = 90; }; }; }
    );

    planes = (
        {
            axis = "Z";
            position = 0;
            material = {
                type = "Color";
                color = { r = 20; g = 22; b = 32; };
                reflectivity = 0.15;
            };
        }
    );
};

background = { r = 15; g = 18; b = 28; };

lights:
{
    ambient = 0.12;
    diffuse = 0.9;

    point = (
        # Lumière chaude proche — simule un lampadaire
        {
            x = -150; y = 60; z = 70;
            intensity = 0.7;
            color = { r = 255; g = 200; b = 120; };
            phong = 32;
        },
        {
            x = 150; y = 60; z = 70;
            intensity = 0.7;
            color = { r = 255; g = 200; b = 120; };
            phong = 32;
        },
        # Lumière froide lointaine
        {
            x = 0; y = 300; z = 200;
            intensity = 0.4;
            color = { r = 150; g = 180; b = 255; };
            phong = 16;
        }
    );

    directional = ();
};
