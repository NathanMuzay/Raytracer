# kickoff.cfg — Scène d'introduction : 3 sphères classiques, damier, fog léger
# Reproduit l'esprit du sujet Epitech mais avec du style

camera:
{
    resolution   = { width = 1920; height = 1080; };
    position     = { x = 0; y = -120; z = 35; };
    rotation     = { x = 0; y = 0; z = 0; };
    fieldOfView  = 72.0;
    antialiasing = 2;
    fog = {
        start   = 180.0;
        density = 0.005;
        color   = { r = 8; g = 8; b = 15; };
    };
};

background = { r = 8; g = 8; b = 15; };

primitives:
{
    spheres = (
        {
            x = -80; y = 40; z = 35; r = 35;
            material = {
                type  = "Color";
                color = { r = 220; g = 80; b = 60; };
                reflectivity = 0.18;
            };
        },
        {
            x = 0; y = 80; z = 35; r = 35;
            material = {
                type  = "Color";
                color = { r = 80; g = 190; b = 110; };
                reflectivity = 0.18;
            };
        },
        {
            x = 90; y = 120; z = 35; r = 35;
            material = {
                type  = "Color";
                color = { r = 80; g = 130; b = 230; };
                reflectivity = 0.18;
            };
        }
    );

    planes = (
        {
            axis     = "Z";
            position = 0;
            material = {
                type         = "Chessboard";
                scale        = 28;
                color1       = { r = 220; g = 220; b = 230; };
                color2       = { r = 25;  g = 25;  b = 38;  };
                reflectivity = 0.25;
            };
        },
        {
            axis     = "Y";
            position = 380;
            material = {
                type  = "Color";
                color = { r = 10; g = 10; b = 20; };
            };
        }
    );
};

lights:
{
    ambient = 0.18;
    diffuse = 1.0;

    point = (
        {
            x = 0; y = -80; z = 280;
            intensity = 1.2;
            color     = { r = 255; g = 248; b = 225; };
            phong     = 64;
        },
        {
            x = -250; y = 50; z = 150;
            intensity = 0.4;
            color     = { r = 120; g = 160; b = 255; };
            phong     = 32;
        },
        {
            x = 250; y = 50; z = 150;
            intensity = 0.4;
            color     = { r = 255; g = 160; b = 100; };
            phong     = 32;
        }
    );

    directional = ();
};
