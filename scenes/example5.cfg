# example2.cfg - Cornell Box

camera:
{
    resolution = { width = 1920; height = 1080; };
    position   = { x = 0; y = -280; z = 80; };
    rotation   = { x = 0; y = 0; z = 0; };
    fieldOfView = 60.0;
    antialiasing = 2;
};

background = { r = 0; g = 0; b = 0; };

primitives:
{
    spheres = (
        # Sphère miroir gauche
        {
            x = -60; y = 80; z = 30;
            r = 30;
            material = {
                type = "Color";
                color = { r = 220; g = 220; b = 220; };
                reflectivity = 0.92;
            };
        },
        # Sphère mate droite
        {
            x = 60; y = 80; z = 25;
            r = 25;
            material = {
                type = "Color";
                color = { r = 240; g = 200; b = 80; };
                reflectivity = 0.05;
            };
        }
    );

    planes = (
        # Sol blanc
        {
            axis = "Z";
            position = 0;
            material = {
                type = "Color";
                color = { r = 230; g = 230; b = 230; };
                reflectivity = 0.1;
            };
        },
        # Plafond blanc
        {
            axis = "Z";
            position = 160;
            material = {
                type = "Color";
                color = { r = 230; g = 230; b = 230; };
                reflectivity = 0.0;
            };
        },
        # Fond blanc
        {
            axis = "Y";
            position = 200;
            material = {
                type = "Color";
                color = { r = 230; g = 230; b = 230; };
                reflectivity = 0.0;
            };
        },
        # Mur gauche rouge
        {
            axis = "X";
            position = -150;
            material = {
                type = "Color";
                color = { r = 220; g = 50; b = 50; };
                reflectivity = 0.05;
            };
        },
        # Mur droit vert
        {
            axis = "X";
            position = 150;
            material = {
                type = "Color";
                color = { r = 50; g = 200; b = 80; };
                reflectivity = 0.05;
            };
        }
    );
};

lights:
{
    ambient = 0.1;
    diffuse = 1.0;

    point = (
        {
            x = 0; y = 80; z = 145;
            intensity = 2.0;
            color = { r = 255; g = 245; b = 220; };
            phong = 32;
        }
    );

    directional = ();
};
