# demo_advanced_primitives.cfg
# Showcase des primitives avancées :
# Torus, Tanglecube, Triangles, Moebius, Fractal (Mandelbulb)
# Chacun bien espacé, éclairage dramatique

camera:
{
    resolution = { width = 1920; height = 1080; };
    position   = { x = 0; y = -280; z = 90; };
    rotation   = { x = 0; y = 0; z = 0; };
    fieldOfView = 80.0;
    antialiasing = 2;
};

primitives:
{
    # --- TORUS (gauche) ---
    torus = (
        {
            x = -300; y = 120; z = 35;
            R = 32.0; r = 10.0;
            rotation = { x = 25; y = 20; z = 0; };
            material = {
                type = "Color";
                color = { r = 255; g = 140; b = 40; };
                reflectivity = 0.3;
            };
        }
    );

    # --- TANGLECUBE (centre-gauche) ---
    tanglecubes = (
        {
            x = -110; y = 100; z = 25;
            scale = 32.0;
            k = 5.0;
            c = 11.8;
            rotation = { x = 20; y = 40; z = 10; };
            material = {
                type = "Color";
                color = { r = 80; g = 220; b = 200; };
                reflectivity = 0.25;
            };
        }
    );

    # --- TRIANGLES (centre — étoile de David stylisée) ---
    triangles = (
        {
            v0 = { x = 0;   y = 80; z = 85; };
            v1 = { x = -45; y = 80; z = 15; };
            v2 = { x = 45;  y = 80; z = 15; };
            material = {
                type = "Color";
                color = { r = 255; g = 80; b = 80; };
                reflectivity = 0.15;
            };
        },
        {
            v0 = { x = 0;   y = 90; z = 5; };
            v1 = { x = -45; y = 90; z = 75; };
            v2 = { x = 45;  y = 90; z = 75; };
            material = {
                type = "Color";
                color = { r = 80; g = 80; b = 255; };
                reflectivity = 0.15;
            };
        }
    );

    # --- MOEBIUS (centre-droite) ---
    moebius = (
        {
            x = 180; y = 120; z = 50;
            R = 38.0;
            w = 12.0;
            rotation = { x = 20; y = 30; z = 0; };
            material = {
                type = "Color";
                color = { r = 200; g = 160; b = 255; };
                reflectivity = 0.2;
            };
        }
    );

    # --- FRACTAL Mandelbulb (droite) ---
    fractals = (
        {
            x = 340; y = 130; z = 30;
            scale = 38.0;
            power = 8;
            iterations = 10;
            bailout = 2.0;
            rotation = { x = 10; y = -30; z = 0; };
            material = {
                type = "Color";
                color = { r = 210; g = 215; b = 255; };
                reflectivity = 0.2;
            };
        }
    );

    planes = (
        {
            axis = "Z";
            position = -15;
            material = {
                type = "Chessboard";
                scale = 40;
                color1 = { r = 200; g = 200; b = 210; };
                color2 = { r = 25; g = 25; b = 35; };
                reflectivity = 0.12;
            };
        },
        {
            axis = "Y";
            position = 400;
            material = {
                type = "Texture";
                path = "assets/textures/sky2.png";
            };
        }
    );
};

