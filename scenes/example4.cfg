# example4.cfg
# Grille de cylindres colorés — structure architecturale industrielle
# Améliorations : sol miroir sombre (reflets des cylindres), fog, antialiasing,
# lumières colorées dramatiques, ajout de réflectivité sur les cylindres

camera:
{
    resolution = { width = 1920; height = 1080; };
    position   = { x = 0; y = -160; z = 100; };
    rotation   = { x = 8; y = 0; z = 0; };
    fieldOfView = 65.0;
    antialiasing = 2;
    fog = {
        start = 250.0;
        density = 0.003;
        color = { r = 5; g = 5; b = 10; };
    };
};

primitives:
{
    cylindres = (
        # ROW 1 - Base structure (horizontal vert), axe X
        { x = -100; y = 0; z = 0; r = 8; h = 200; material = { type = "Color"; color = { r = 0; g = 200; b = 0; }; reflectivity = 0.15; }; rotation = { x = 90; y = 0; z = 0; }; },
        { x = 0;    y = 0; z = 0; r = 8; h = 200; material = { type = "Color"; color = { r = 0; g = 200; b = 0; }; reflectivity = 0.15; }; rotation = { x = 90; y = 0; z = 0; }; },
        { x = 100;  y = 0; z = 0; r = 8; h = 200; material = { type = "Color"; color = { r = 0; g = 200; b = 0; }; reflectivity = 0.15; }; rotation = { x = 90; y = 0; z = 0; }; },

        # ROW 2 - Supports verticaux rouges
        { x = -100; y = 30; z = 0; r = 6; h = 80; material = { type = "Color"; color = { r = 220; g = 50; b = 50; }; reflectivity = 0.2; }; rotation = { x = 0; y = 0; z = 0; }; },
        { x = -50;  y = 30; z = 0; r = 6; h = 80; material = { type = "Color"; color = { r = 220; g = 50; b = 50; }; reflectivity = 0.2; }; rotation = { x = 0; y = 0; z = 0; }; },
        { x = 0;    y = 30; z = 0; r = 6; h = 80; material = { type = "Color"; color = { r = 220; g = 50; b = 50; }; reflectivity = 0.2; }; rotation = { x = 0; y = 0; z = 0; }; },
        { x = 50;   y = 30; z = 0; r = 6; h = 80; material = { type = "Color"; color = { r = 220; g = 50; b = 50; }; reflectivity = 0.2; }; rotation = { x = 0; y = 0; z = 0; }; },
        { x = 100;  y = 30; z = 0; r = 6; h = 80; material = { type = "Color"; color = { r = 220; g = 50; b = 50; }; reflectivity = 0.2; }; rotation = { x = 0; y = 0; z = 0; }; },

        # ROW 3 - Membres horizontaux bleus
        { x = -100; y = 60; z = 20; r = 5; h = 200; material = { type = "Color"; color = { r = 50; g = 100; b = 220; }; reflectivity = 0.2; }; rotation = { x = 90; y = 0; z = 0; }; },
        { x = -50;  y = 60; z = 20; r = 5; h = 200; material = { type = "Color"; color = { r = 50; g = 100; b = 220; }; reflectivity = 0.2; }; rotation = { x = 90; y = 0; z = 0; }; },
        { x = 0;    y = 60; z = 20; r = 5; h = 200; material = { type = "Color"; color = { r = 50; g = 100; b = 220; }; reflectivity = 0.2; }; rotation = { x = 90; y = 0; z = 0; }; },
        { x = 50;   y = 60; z = 20; r = 5; h = 200; material = { type = "Color"; color = { r = 50; g = 100; b = 220; }; reflectivity = 0.2; }; rotation = { x = 90; y = 0; z = 0; }; },
        { x = 100;  y = 60; z = 20; r = 5; h = 200; material = { type = "Color"; color = { r = 50; g = 100; b = 220; }; reflectivity = 0.2; }; rotation = { x = 90; y = 0; z = 0; }; },

        # ROW 4 - Supports verts niveau intermédiaire
        { x = -100; y = 90; z = 0; r = 7; h = 60; material = { type = "Color"; color = { r = 50; g = 200; b = 50; }; reflectivity = 0.15; }; rotation = { x = 0; y = 0; z = 0; }; },
        { x = -50;  y = 90; z = 0; r = 7; h = 60; material = { type = "Color"; color = { r = 50; g = 200; b = 50; }; reflectivity = 0.15; }; rotation = { x = 0; y = 0; z = 0; }; },
        { x = 0;    y = 90; z = 0; r = 7; h = 60; material = { type = "Color"; color = { r = 50; g = 200; b = 50; }; reflectivity = 0.15; }; rotation = { x = 0; y = 0; z = 0; }; },
        { x = 50;   y = 90; z = 0; r = 7; h = 60; material = { type = "Color"; color = { r = 50; g = 200; b = 50; }; reflectivity = 0.15; }; rotation = { x = 0; y = 0; z = 0; }; },
        { x = 100;  y = 90; z = 0; r = 7; h = 60; material = { type = "Color"; color = { r = 50; g = 200; b = 50; }; reflectivity = 0.15; }; rotation = { x = 0; y = 0; z = 0; }; },

        # ROW 5 - Membres rouges intermédiaires
        { x = -100; y = 120; z = 0; r = 6; h = 200; material = { type = "Color"; color = { r = 200; g = 80; b = 80; }; reflectivity = 0.2; }; rotation = { x = 90; y = 0; z = 0; }; },
        { x = -50;  y = 120; z = 0; r = 6; h = 200; material = { type = "Color"; color = { r = 200; g = 80; b = 80; }; reflectivity = 0.2; }; rotation = { x = 90; y = 0; z = 0; }; },
        { x = 0;    y = 120; z = 0; r = 6; h = 200; material = { type = "Color"; color = { r = 200; g = 80; b = 80; }; reflectivity = 0.2; }; rotation = { x = 90; y = 0; z = 0; }; },
        { x = 50;   y = 120; z = 0; r = 6; h = 200; material = { type = "Color"; color = { r = 200; g = 80; b = 80; }; reflectivity = 0.2; }; rotation = { x = 90; y = 0; z = 0; }; },
        { x = 100;  y = 120; z = 0; r = 6; h = 200; material = { type = "Color"; color = { r = 200; g = 80; b = 80; }; reflectivity = 0.2; }; rotation = { x = 90; y = 0; z = 0; }; },

        # ROW 6 - Supports bleus sommet
        { x = -100; y = 150; z = 0; r = 7; h = 50; material = { type = "Color"; color = { r = 80; g = 150; b = 220; }; reflectivity = 0.2; }; rotation = { x = 0; y = 0; z = 0; }; },
        { x = -50;  y = 150; z = 0; r = 7; h = 50; material = { type = "Color"; color = { r = 80; g = 150; b = 220; }; reflectivity = 0.2; }; rotation = { x = 0; y = 0; z = 0; }; },
        { x = 0;    y = 150; z = 0; r = 7; h = 50; material = { type = "Color"; color = { r = 80; g = 150; b = 220; }; reflectivity = 0.2; }; rotation = { x = 0; y = 0; z = 0; }; },
        { x = 50;   y = 150; z = 0; r = 7; h = 50; material = { type = "Color"; color = { r = 80; g = 150; b = 220; }; reflectivity = 0.2; }; rotation = { x = 0; y = 0; z = 0; }; },
        { x = 100;  y = 150; z = 0; r = 7; h = 50; material = { type = "Color"; color = { r = 80; g = 150; b = 220; }; reflectivity = 0.2; }; rotation = { x = 0; y = 0; z = 0; }; },

        # ROW 7 - Membres verts sommet
        { x = -100; y = 180; z = 0; r = 8; h = 200; material = { type = "Color"; color = { r = 0; g = 255; b = 0; }; reflectivity = 0.15; }; rotation = { x = 90; y = 0; z = 0; }; },
        { x = -50;  y = 180; z = 0; r = 8; h = 200; material = { type = "Color"; color = { r = 0; g = 255; b = 0; }; reflectivity = 0.15; }; rotation = { x = 90; y = 0; z = 0; }; },
        { x = 0;    y = 180; z = 0; r = 8; h = 200; material = { type = "Color"; color = { r = 0; g = 255; b = 0; }; reflectivity = 0.15; }; rotation = { x = 90; y = 0; z = 0; }; },
        { x = 50;   y = 180; z = 0; r = 8; h = 200; material = { type = "Color"; color = { r = 0; g = 255; b = 0; }; reflectivity = 0.15; }; rotation = { x = 90; y = 0; z = 0; }; },
        { x = 100;  y = 180; z = 0; r = 8; h = 200; material = { type = "Color"; color = { r = 0; g = 255; b = 0; }; reflectivity = 0.15; }; rotation = { x = 90; y = 0; z = 0; }; },

        # Tirants axe Y — orange
        { x = -100; y = 0; z = 40; r = 5; h = 180; material = { type = "Color"; color = { r = 220; g = 100; b = 50; }; reflectivity = 0.15; }; rotation = { x = 0; y = 90; z = 0; }; },
        { x = -50;  y = 0; z = 40; r = 5; h = 180; material = { type = "Color"; color = { r = 220; g = 100; b = 50; }; reflectivity = 0.15; }; rotation = { x = 0; y = 90; z = 0; }; },
        { x = 0;    y = 0; z = 40; r = 5; h = 180; material = { type = "Color"; color = { r = 220; g = 100; b = 50; }; reflectivity = 0.15; }; rotation = { x = 0; y = 90; z = 0; }; },
        { x = 50;   y = 0; z = 40; r = 5; h = 180; material = { type = "Color"; color = { r = 220; g = 100; b = 50; }; reflectivity = 0.15; }; rotation = { x = 0; y = 90; z = 0; }; },
        { x = 100;  y = 0; z = 40; r = 5; h = 180; material = { type = "Color"; color = { r = 220; g = 100; b = 50; }; reflectivity = 0.15; }; rotation = { x = 0; y = 90; z = 0; }; },

        # Accents sombres aux angles
        { x = -100; y = 0; z = 0; r = 4; h = 180; material = { type = "Color"; color = { r = 20; g = 20; b = 30; }; reflectivity = 0.3; }; rotation = { x = 0; y = 90; z = 0; }; },
        { x = 100;  y = 0; z = 0; r = 4; h = 180; material = { type = "Color"; color = { r = 20; g = 20; b = 30; }; reflectivity = 0.3; }; rotation = { x = 0; y = 90; z = 0; }; }
    );

    planes = (
        # Sol miroir sombre — les cylindres colorés s'y reflètent
        {
            axis = "Z";
            position = -10;
            material = {
                type = "Color";
                color = { r = 12; g = 12; b = 20; };
                reflectivity = 0.55;
            };
        },
        # Mur fond
        {
            axis = "Y";
            position = 260;
            material = {
                type = "Color";
                color = { r = 8; g = 8; b = 15; };
                reflectivity = 0.0;
            };
        }
    );
};

background = { r = 5; g = 5; b = 10; };

lights:
{
    ambient = 0.3;
    diffuse = 0.95;

    point = (
        # Lumière froide gauche
        {
            x = -200; y = -100; z = 300;
            intensity = 0.8;
            color = { r = 150; g = 200; b = 255; };
            phong = 64;
        },
        # Lumière chaude droite
        {
            x = 200; y = -100; z = 300;
            intensity = 0.8;
            color = { r = 255; g = 200; b = 120; };
            phong = 64;
        },
        # Lumière zénith blanche
        {
            x = 0; y = 150; z = 350;
            intensity = 0.6;
            color = { r = 240; g = 240; b = 255; };
            phong = 32;
        }
    );

    directional = (
        {
            x = 0.1;
            y = 0.6;
            z = 0.9;
        }
    );
};
