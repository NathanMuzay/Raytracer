# example3.cfg - Ambiance brumeuse avec AO

camera:
{
    resolution = { width = 1920; height = 1080; };
    position   = { x = 0; y = -220; z = 70; };
    rotation   = { x = 0; y = 0; z = 0; };
    fieldOfView = 75.0;
    antialiasing = 2;
    fog = {
        start = 200.0;
        density = 0.004;
        color = { r = 15; g = 12; b = 25; };
    };
    ao = {
        enabled = true;
        samples = 16;
        radius = 40.0;
        intensity = 0.7;
    };
};

background = { r = 15; g = 12; b = 25; };

primitives:
{
    spheres = (
        { x = -120; y = 100; z = 30; r = 30;
          material = { type = "Color"; color = { r = 200; g = 80; b = 80; }; reflectivity = 0.15; }; },
        { x = 0;    y = 120; z = 40; r = 40;
          material = { type = "PerlinNoise"; scale = 22.0; persistence = 0.5; octaves = 5;
                       color1 = { r = 180; g = 160; b = 220; }; color2 = { r = 40; g = 20; b = 80; }; }; },
        { x = 120;  y = 100; z = 30; r = 30;
          material = { type = "Color"; color = { r = 80; g = 180; b = 200; }; reflectivity = 0.15; }; },
        { x = -60;  y = 50;  z = 18; r = 18;
          material = { type = "Chessboard"; scale = 14; color1 = { r = 240; g = 240; b = 240; }; color2 = { r = 20; g = 20; b = 20; }; reflectivity = 0.2; }; },
        { x = 60;   y = 50;  z = 18; r = 18;
          material = { type = "Color"; color = { r = 220; g = 180; b = 60; }; reflectivity = 0.3; }; }
    );

    planes = (
        {
            axis = "Z";
            position = 0;
            material = {
                type = "Chessboard";
                scale = 45;
                color1 = { r = 60; g = 55; b = 80; };
                color2 = { r = 20; g = 18; b = 30; };
                reflectivity = 0.2;
            };
        }
    );
};

lights:
{
    ambient = 0.12;
    diffuse = 0.9;

    point = (
        {
            x = 0; y = 0; z = 180;
            intensity = 1.5;
            color = { r = 180; g = 160; b = 255; };
            phong = 64;
        },
        {
            x = -200; y = 80; z = 80;
            intensity = 0.5;
            color = { r = 255; g = 100; b = 80; };
            phong = 32;
        }
    );

    directional = ();
};
